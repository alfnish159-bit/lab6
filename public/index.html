<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Heating</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <h1>Контроллер умного отопления</h1>

    <div class="card">
      <label>Температура в комнате</label>
      <input id="currentTemp" type="number" step="0.01" placeholder="Например: 15" />

      <label>Целевая температура</label>
      <input id="targetTemp" type="number" step="0.01" value="20" />

      <div class="modes">
        <label><input id="modeEco" type="radio" name="mode" value="Эко" checked /> Эко</label>
        <label><input id="modeComfort" type="radio" name="mode" value="Комфорт" /> Комфорт</label>
      </div>

      <div class="actions">
        <button id="sendBtn" type="button">Отправить команду</button>
        <button id="checkSensorBtn" type="button">Проверить датчик</button>
      </div>

      <div id="result" class="result"></div>
      <div id="error" class="error"></div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
