name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: tests (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18.x, 20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server (background)
        run: |
          npm start &
          npx wait-on http://localhost:3000

      - name: Run unit tests (Jest)
        run: npm run test:unit

      - name: Run API/BDD tests (Cucumber)
        run: npm run bdd

      - name: Run UI tests (Playwright)
        run: npm run test:ui

      - name: Upload reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.os }}-node-${{ matrix.node }}
          path: |
            report.html
            playwright-report/
            test-results/
