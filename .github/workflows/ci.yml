name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  unit:
    name: unit (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Unit tests (Jest)
        run: npm run test:unit

  bdd:
    name: bdd (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run BDD tests (Cucumber)
        run: npm run bdd

      - name: Upload BDD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-report-${{ matrix.os }}-node-${{ matrix.node }}
          path: report.html

  ui:
    name: ui (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server
        run: |
          npm start &
          npx wait-on http://localhost:3000

      - name: Run UI tests (Playwright)
        run: npm run test:ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report-${{ matrix.os }}-node-${{ matrix.node }}
          path: |
            playwright-report/
            test-results/

  notify:
    name: telegram notify
    runs-on: ubuntu-latest
    needs: [unit, bdd, ui]
    if: always()
    steps:
      - name: Send Telegram message
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            CI finished: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Results: unit=${{ needs.unit.result }}, bdd=${{ needs.bdd.result }}, ui=${{ needs.ui.result }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
